name: Daily YouTube Scraper

on:
  schedule:
    # Runs at 10:00 UTC (around 5:00 AM EST) every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab!

jobs:
  scrape-channels:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare Google Credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run YouTube Discovery Scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Runs until daily API quota (10,000 units) is exhausted. Must use a single key to comply with TOS.
          python youtube_api_discovery/discover_channels_api.py --api-key "$YOUTUBE_API_KEY" --google-sheet "YT_Scraper_DB" --max-channels 10000
          
      - name: Clean up credentials
        if: always()
        run: rm -f google_credentials.json
